name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Use uvx so ruff runs in its own ephemeral env — no uv sync or
      # lock-file resolution needed, and no issues with the Windows-only
      # torch/ROCm dependencies being absent on the Linux runner.
      - name: Check formatting
        run: uvx ruff format --check .

      - name: Lint and check import sorting
        run: uvx ruff check --output-format=github --extend-select I .

      - name: Build package
        run: uv build
