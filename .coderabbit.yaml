# CodeRabbit AI pull-request review configuration.
#
# SETUP: Install the free CodeRabbit GitHub App at
#   https://github.com/apps/coderabbit-ai
# then open any PR — reviews appear automatically.
#
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"

reviews:
  profile: "chill"          # constructive, not nitpicky
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - master

  # Don't waste tokens reviewing generated / binary lock files.
  path_filters:
    - "!uv.lock"
    - "!uv.lock.*"
    - "!bin/**"

  path_instructions:
    - path: "src/heretic/main.py"
      instructions: |
        This file contains Windows AMD ROCm-specific patches inserted before the
        heavy ML imports (sections 4–6 in the early startup block):

        Section 4 – Interactive first-run setup prompt: detects AMD GPU, offers to
        run setup_rocm.py via a spawned PowerShell window (trampoline pattern to
        release the heretic.exe file lock), then relaunches heretic in the original
        terminal via SetForegroundWindow + SendKeys.

        Section 5 – bitsandbytes pre-patch: copies the prebuilt ROCm DLL into the
        bitsandbytes package directory before bitsandbytes is imported.

        Section 6 – _PurePySafeOpen: a pure-Python safetensors reader that replaces
        safetensors.safe_open BEFORE transformers/accelerate are imported.  It reads
        the binary .safetensors format directly with struct+json+torch.frombuffer,
        bypassing _safetensors_rust.pyd entirely to avoid the 0xC0000005 access
        violation that occurs on Windows ROCm when the Rust→legacy_tensor_ctor
        callback path is hit.  Key requirements: context-manager protocol
        (__enter__/__exit__), keys(), offset_keys(), metadata(), get_tensor(),
        get_slice(), correct BF16 handling (read as int16, view as bfloat16).

        Flag any change to section 6 that: removes context-manager support, calls
        _safetensors_rust.pyd, or changes the BF16 reinterpretation logic.

    - path: "scripts/**"
      instructions: |
        Windows AMD ROCm setup scripts.  setup_rocm.py swaps pyproject.toml /
        uv.lock for the correct RDNA variant and patches bitsandbytes.
        patch_bitsandbytes.py copies the prebuilt DLL.
        Review for Windows path handling and GPU generation detection correctness.

    - path: "pyproject*.toml"
      instructions: |
        The base pyproject.toml is the CPU-only / CI variant.  Three architecture
        variants also exist: pyproject.rdna2.toml (gfx103X), pyproject.rdna3.toml
        (gfx110X), pyproject.rdna4.toml (gfx120X).  Each pins torch + torchvision
        as direct wheel URLs.  Changes to the base file should be evaluated for
        propagation to all three arch variants.

chat:
  auto_reply: true
